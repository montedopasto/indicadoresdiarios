<!doctype html>
<html lang="pt-PT">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Monte do Pasto · Painel Vivo</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box}
html,body{height:100%;margin:0}

:root{
  --g1:#6fa98c;
  --g2:#4f7f63;
  --b1:#7b6445;

--glass:rgba(0,0,0,.28);
--glass2:rgba(0,0,0,.40);
  --stroke:rgba(255,255,255,.25);

  --t1:#f4f6f3;
  --t2:rgba(244,246,243,.80);
  --t3:rgba(244,246,243,.60);

  --r1:18px;
  --r2:26px;
}

body{
  font-family:Inter,system-ui,Arial;
  color:var(--t1);
  overflow:hidden;
  background:
    radial-gradient(1200px 800px at 20% 10%, rgba(255,255,255,.20), transparent 60%),
    radial-gradient(900px 700px at 80% 20%, rgba(200,160,110,.18), transparent 60%),
    radial-gradient(1200px 900px at 60% 90%, rgba(140,220,180,.25), transparent 65%),
    linear-gradient(135deg,var(--g1),var(--g2) 55%,var(--b1));
}

/* ========= FX LAYER (sempre visível) ========= */
#fx{
  position:fixed;
  inset:0;
  pointer-events:none;
  z-index:2;
}

.drop{
  position:absolute;
  width:2px;
  height:20px;
  background:rgba(220,245,255,.85);
  border-radius:999px;
  animation:fall linear infinite;
}
@keyframes fall{from{transform:translateY(-140px)}to{transform:translateY(110vh)}}

.fog{
  position:absolute;inset:-20%;
  background:
    radial-gradient(circle at 30% 50%, rgba(255,255,255,.16), transparent 55%),
    radial-gradient(circle at 70% 60%, rgba(255,255,255,.12), transparent 60%);
  animation:fogmove 120s linear infinite;
  opacity:.35;
}
@keyframes fogmove{from{transform:translateX(0)}to{transform:translateX(-14%)}}

.sunGlow{
  position:absolute;top:6%;right:10%;
  width:260px;height:260px;border-radius:50%;
  background:radial-gradient(circle,
    rgba(255,230,170,.85),
    rgba(255,210,150,.32),
    transparent 66%);
  animation:sunpulse 7s ease-in-out infinite;
  opacity:.75;
}
@keyframes sunpulse{0%,100%{transform:scale(.95)}50%{transform:scale(1.04)}}

/* ========= APP ========= */
.app{
  position:relative;
  z-index:3;
  height:100vh;
  display:grid;
  grid-template-rows:90px 1fr 48px;
}

/* ========= HEADER ========= */
header{
  padding:0 24px;
  display:flex;
  align-items:center;
  gap:14px;
  justify-content:space-between;
}

.header-left{
  display:flex;
  align-items:center;
  gap:14px;
  min-width:420px;
}

.logo{
  height:54px;
  filter:drop-shadow(0 10px 18px rgba(0,0,0,.18));
}

.now{
  display:flex;
  align-items:center;
  gap:12px;
  padding:10px 14px;
  border-radius:var(--r1);
  background:linear-gradient(180deg,var(--glass),var(--glass2));
  border:1px solid var(--stroke);
  backdrop-filter: blur(10px);
}

.now .temp{font-size:20px;font-weight:900;line-height:1}
.now .desc{font-size:13px;color:var(--t2);margin-top:2px}

.header-mid{
  flex:1;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:14px;
  min-width:0;
}

.group{
  display:flex;
  align-items:center;
  gap:12px;
  padding:10px 14px;
  border-radius:var(--r1);
  background:linear-gradient(180deg,var(--glass),var(--glass2));
  border:1px solid var(--stroke);
  backdrop-filter: blur(10px);
  max-width:46vw;
  overflow:hidden;
}

.group-title{
  font-size:11px;
  text-transform:uppercase;
  color:var(--t2);
  letter-spacing:.7px;
  white-space:nowrap;
}

.pills{display:flex;gap:10px}

.pill{
  display:flex;
  align-items:center;
  gap:10px;
  padding:8px 12px;
  border-radius:16px;
  background:rgba(255,255,255,.22);
  border:1px solid rgba(255,255,255,.18);
  min-width:108px;
  animation:float 6s ease-in-out infinite;
}
.pill:nth-child(2){animation-delay:.6s}
.pill:nth-child(3){animation-delay:1.2s}
.pill:nth-child(4){animation-delay:1.8s}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-3px)}}

.pill .big{font-size:15px;font-weight:900;line-height:1}
.pill .sub{font-size:11px;color:var(--t3);margin-top:2px}

.clock{
  flex:0 0 auto;
  flex-shrink:0;
  min-width:120px;
  text-align:right;
  font-size:28px;
  font-weight:900;
  line-height:1;
  text-shadow:0 10px 18px rgba(0,0,0,.18);
}

/* ========= Weather icons SVG ========= */

.icon{
  width:40px;
  height:40px;
  display:flex;
  align-items:center;
  justify-content:center;
}

.icon svg{
  width:100%;
  height:100%;
}

/* ========= KPIs ========= */
main{
  padding:22px 28px;

    display:flex;
  align-items:center;
  justify-content:center;
.card{
  width:70%;
  max-width:900px;
}
  gap:22px;

  height:calc(100vh - 90px - 48px - 44px);
}

.card{
  background:linear-gradient(180deg,var(--glass),var(--glass2));
  border:1px solid var(--stroke);
  border-radius:var(--r2);
  padding:18px 20px;
  backdrop-filter: blur(10px);
  transition:opacity .4s, transform .4s;

  display:flex;
  flex-direction:column;
  justify-content:center;

  min-height:140px;
  height:100%;

  box-shadow:0 18px 40px rgba(0,0,0,.45);
}

.card.hidden{
  display:none;
}

.card h3{
  margin:0 0 14px;
  font-size:18px;
  text-transform:uppercase;
  font-weight:800;
  letter-spacing:1px;
  color:#ffd54f; /* dourado técnico */
  text-shadow:0 2px 6px rgba(0,0,0,.6);
}

.kpi{
  font-size: clamp(22px, 3.5vw, 46px);
  font-weight:900;
  line-height:1.1;
  letter-spacing:.5px;
  color:#ffffff;
  text-shadow:0 6px 16px rgba(0,0,0,.7);

  white-space: normal;
  word-break: break-word;
}
  .kpi-multiline{
  font-size: clamp(18px, 2.2vw, 32px);
  font-weight:800;
  line-height:1.25;
  letter-spacing:.5px;
  color:#ffffff;
  text-shadow:0 6px 16px rgba(0,0,0,.7);
  white-space:normal;
}
.kpi span{font-size:18px;color:var(--t2)}
.kpi-sub{
  margin-top:10px;
  font-size:18px;
  color:#e0f2e8;
  font-weight:600;
}
.thi-indicator{
  display:inline-block;
  width:18px;
  height:18px;
  border-radius:50%;
  margin-left:10px;
  box-shadow:0 0 12px rgba(0,0,0,.35);
}

.thi-ok{ background:#2ecc71; }
.thi-alerta{ background:#f1c40f; }
.thi-stress{ background:#e67e22; }
.thi-severo{ background:#e74c3c; }
.kpi-image img{
  width:100%;
  max-height:300px;
  object-fit:contain;
  border-radius:14px;
  background:rgba(0,0,0,.10);
}

/* ========= Footer ========= */
footer{
  padding:0 28px;
  display:flex;
  align-items:center;
  color:var(--t2);
  font-size:14px;
}

/* ========= ERVA ========= */
.footer-field{
  position:fixed;
  left:0; right:0; bottom:0;
  height:120px;
  z-index:4;
  pointer-events:none;
  background:
    linear-gradient(to top, rgba(0,0,0,.35), rgba(0,0,0,0) 70%),
    url("assets/grass.png") repeat-x bottom;
  background-size:auto 120px;
  transition:filter 2.5s ease;
}
.footer-field.dry{filter:saturate(.6) brightness(.9)}
.footer-field.normal{filter:saturate(1) brightness(1)}
.footer-field.wet{filter:saturate(1.35) brightness(1.05)}

/* ========= NEWS ========= */
.news-bar{
  position:fixed;
  left:0; right:0; bottom:0;
  height:68px;
  z-index:5;
  display:flex;
  align-items:center;
  overflow:hidden;
  background:linear-gradient(180deg, rgba(0,0,0,.40), rgba(0,0,0,.65));
  border-top:1px solid rgba(255,255,255,.28);
  backdrop-filter: blur(10px);
  pointer-events:none;
}
.news-track{
  display:inline-block;
  white-space:nowrap;
  padding-left:100%;
  animation:news-scroll 45s linear infinite;
  font-size:24px;
  font-weight:800;
  letter-spacing:.4px;
  color:var(--t1);
  text-shadow:0 10px 18px rgba(0,0,0,.35);
}
.news-item{display:inline-block;margin-right:100px}
@keyframes news-scroll{from{transform:translateX(0)}to{transform:translateX(-100%)}}

/* ===== ESTADOS DINÂMICOS DO PAINEL ===== */
body.estado-normal{}
body.estado-chuva{}
body.estado-seca{}

/* ===== CICLO DO DIA ===== */
body.periodo-manha{filter:brightness(1.05) saturate(1.05);transition:filter 2s ease}
body.periodo-dia{filter:brightness(1.1);transition:filter 2s ease}
body.periodo-por{filter:sepia(.18) saturate(1.2);transition:filter 2s ease}
body.periodo-noite{filter:brightness(.75) saturate(.85) hue-rotate(-8deg);transition:filter 2s ease}
#tv-pip{
  position:fixed;
  bottom:90px;
  right:20px;
  width:320px;
  height:180px;
  border-radius:14px;
  overflow:hidden;
  z-index:10;

  box-shadow:0 10px 30px rgba(0,0,0,.6);
  border:2px solid rgba(255,255,255,.2);
  background:#000;
}

#tv-pip iframe{
  width:100%;
  height:100%;
  border:0;
}
</style>
</head>

<body>
<div id="fx"></div>

<div class="app">
  <header>

<script>
/* ================= CONFIG ================= */
var LAT = 38.219, LON = -7.887;

var MAX_VISIBLE = 1;
var ROTATE_MS = 7000;

var SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRcoOLTXvKf6K_4aejdyA7ZK6PObIzqyiLBBOPSehdSkKlxj9_ms0EqJOjT7u2lN11j5DaYIAkcqoy7/pub?output=csv";
var NEWS_SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSgtnmWS6XFXm8V80ZzxQ1n4QwGxncyWqw4LnljjBu2kG5xWIRBoMLM_ya7cyg9B_Jyi9N2gqjSvVfS/pub?gid=0&single=true&output=csv";

var WEATHER_URL =
  "https://api.open-meteo.com/v1/forecast?latitude="+LAT+"&longitude="+LON+
  "&current_weather=true"+
  "&hourly=temperature_2m,relativehumidity_2m,precipitation,weathercode,windspeed_10m,shortwave_radiation"+
  "&daily=temperature_2m_max,temperature_2m_min,weathercode"+
  "&timezone=auto";

/* ================= ESTADO THI (memória) ================= */
var LAST_THI = null;
var LAST_THI_LEVEL = null;
var LAST_RAIN_YTD = 0;

var LAST_RAIN_3D = null;
var LAST_TEMP = 0;
var IGCB_HISTORY = [];
var LAST_HISTORY_DAY = null;
var ISA_HISTORY = [];

try{
  var savedHistory = localStorage.getItem("IGCB_HISTORY");
  if(savedHistory){
    IGCB_HISTORY = JSON.parse(savedHistory);
  }

  var savedDay = localStorage.getItem("IGCB_HISTORY_DAY");
  if(savedDay){
    LAST_HISTORY_DAY = savedDay;
  }
}catch(e){}
/* ================= CLOCK ================= */
function tick(){
  var d = new Date();
  var hh = ("0"+d.getHours()).slice(-2);
  var mm = ("0"+d.getMinutes()).slice(-2);
  document.getElementById("clock").textContent = hh+":"+mm;
}
tick();
setInterval(tick, 30000);

/* ===== CICLO DO DIA ===== */
function updateDayPeriod(){
  var hour = new Date().getHours();
  document.body.classList.remove("periodo-manha","periodo-dia","periodo-por","periodo-noite");
  if(hour >= 6 && hour < 11) document.body.classList.add("periodo-manha");
  else if(hour >= 11 && hour < 18) document.body.classList.add("periodo-dia");
  else if(hour >= 18 && hour < 21) document.body.classList.add("periodo-por");
  else document.body.classList.add("periodo-noite");
}

/* ================= OPEN-METEO CODES ================= */
function isRainCode(code){
  return (code===51||code===53||code===55||code===61||code===63||code===65||code===80||code===81||code===82||code===95||code===96||code===99);
}
  function descFrom(code){
  if (isRainCode(code)) return "Chuva";
  if (code === 0) return "Sol";
  return "Nublado";
}
function getWeatherIconSVG(code){

  // 🌧️ CHUVA
  if(isRainCode(code)){
    return `
    <svg viewBox="0 0 64 64">
      <!-- Sol escondido -->
      <circle cx="22" cy="20" r="10" fill="#FFC107" opacity="0.9"/>

      <!-- Nuvem -->
      <g>
        <ellipse cx="36" cy="34" rx="18" ry="12" fill="#2E9DB0">
          <animateTransform attributeName="transform"
            type="translate"
            values="0 0;2 0;0 0"
            dur="4s"
            repeatCount="indefinite"/>
        </ellipse>
        <ellipse cx="26" cy="32" rx="12" ry="10" fill="#39A3B6"/>
        <ellipse cx="48" cy="34" rx="10" ry="9" fill="#2B8FA1"/>
      </g>

      <!-- Gotas animadas -->
      <g fill="#1CA3EC">
        <circle cx="24" cy="48" r="3">
          <animate attributeName="cy"
                   values="44;54"
                   dur="0.8s"
                   repeatCount="indefinite"/>
          <animate attributeName="opacity"
                   values="1;0"
                   dur="0.8s"
                   repeatCount="indefinite"/>
        </circle>

        <circle cx="36" cy="50" r="3">
          <animate attributeName="cy"
                   values="46;56"
                   dur="1s"
                   repeatCount="indefinite"/>
          <animate attributeName="opacity"
                   values="1;0"
                   dur="1s"
                   repeatCount="indefinite"/>
        </circle>

        <circle cx="46" cy="48" r="3">
          <animate attributeName="cy"
                   values="44;54"
                   dur="0.9s"
                   repeatCount="indefinite"/>
          <animate attributeName="opacity"
                   values="1;0"
                   dur="0.9s"
                   repeatCount="indefinite"/>
        </circle>
      </g>
    </svg>
    `;
  }

  // ☀️ SOL
  if(code === 0){
    return `
    <svg viewBox="0 0 64 64">
      <circle cx="32" cy="32" r="14" fill="#FFC107">
        <animate attributeName="r"
                 values="13;15;13"
                 dur="3s"
                 repeatCount="indefinite"/>
      </circle>

      <g stroke="#FF9800" stroke-width="4" stroke-linecap="round">
        <line x1="32" y1="6" x2="32" y2="16"/>
        <line x1="32" y1="48" x2="32" y2="58"/>
        <line x1="6" y1="32" x2="16" y2="32"/>
        <line x1="48" y1="32" x2="58" y2="32"/>
        <line x1="12" y1="12" x2="18" y2="18"/>
        <line x1="46" y1="46" x2="52" y2="52"/>
        <line x1="46" y1="18" x2="52" y2="12"/>
        <line x1="12" y1="52" x2="18" y2="46"/>
      </g>
    </svg>
    `;
  }

  // ☁️ NUBLADO
  return `
  <svg viewBox="0 0 64 64">
    <g>
      <ellipse cx="36" cy="36" rx="18" ry="12" fill="#2E9DB0">
        <animateTransform attributeName="transform"
          type="translate"
          values="0 0;3 0;0 0"
          dur="5s"
          repeatCount="indefinite"/>
      </ellipse>
      <ellipse cx="26" cy="34" rx="12" ry="10" fill="#39A3B6"/>
      <ellipse cx="48" cy="36" rx="10" ry="9" fill="#2B8FA1"/>
    </g>
  </svg>
  `;
}

/* ================= THI + IGCB ================= */

function calcTHI(tempC, rh){
  return tempC - ((0.55 - 0.0055 * rh) * (tempC - 14.5));
}

function calcIGCB(tempC, rh, wind, radiation, rain3d, rainYTD){

  let thi = calcTHI(tempC, rh);

  let stressHeat = Math.max(0, thi - 68) * 1.8;
  let stressSun = radiation * 0.02;
  let benefitWind = Math.min(wind * 0.4, 6); // máximo 6 pontos de benefício

  // 👉 Stress frio húmido
let stressCold = 0;

// frio húmido mais realista
if(tempC < 12 && rh > 85) stressCold = 12;
if(tempC < 8 && rh > 85) stressCold = 20;
if(tempC < 5 && rh > 85) stressCold = 30;

  // 👉 Stress lama NÃO linear + saturação estrutural
  let stressMud = 0;

  if(rain3d > 60) stressMud = 30;
else if(rain3d > 40) stressMud = 20;
else if(rain3d > 20) stressMud = 12;
else if(rain3d > 10) stressMud = 5;

if(rainYTD > 200) stressMud += 5;
if(rainYTD > 280) stressMud += 10;
if(rainYTD > 350) stressMud += 15;
// inércia do solo: mesmo sem chuva recente, pode haver lama residual
if (rainYTD > 300 && rain3d < 10) stressMud += 5;
if (rainYTD > 380 && rain3d < 10) stressMud += 3; // extra em anos muito húmidos
  let base = 92;

let score = base - (
  stressHeat +
  stressSun +
  stressMud +
  stressCold -
  benefitWind
);

  return Math.max(0, Math.min(100, score));
}
function igcbLevel(igcb){

  if (igcb >= 85) return { txt:"Conforto ótimo", class:"thi-ok" };
  if (igcb >= 70) return { txt:"Conforto aceitável", class:"thi-alerta" };
  if (igcb >= 55) return { txt:"Stress ambiental", class:"thi-stress" };

  return { txt:"Stress crítico", class:"thi-severo" };
}
function igcbActionPlan(igcb, rain3d, tempC){

  if(igcb >= 85){
    return "Condições ótimas. Maneio normal.";
  }

  if(igcb >= 70){
    return "Monitorizar parques mais húmidos e zonas de sombra.";
  }

  if(igcb >= 55){
    if(rain3d > 30){
      return "⚠️ Avaliar redistribuição de animais para parques mais secos.";
    }
    return "⚠️ Reforçar vigilância sanitária e ingestão alimentar.";
  }

  if(rain3d > 40){
    return "🚨 Alto risco de lama. Considerar movimentação urgente e reforço energético.";
  }

  if(tempC < 5){
    return "🚨 Stress por frio húmido. Aumentar energia da dieta.";
  }

  return "🚨 Stress elevado. Avaliar intervenção imediata.";
}
  function upsertTHICard(valor, level, trend){

  var grid = document.getElementById("kpis");
  if(!grid) return;

  var old = document.getElementById("thiCard");
  if(old) old.remove();

  var action = igcbActionPlan(valor, LAST_RAIN_3D, LAST_TEMP);

  var card = document.createElement("div");
  card.className = "card kpi-card";
  card.id = "thiCard";

  card.innerHTML =
  "<h3>🐄 Índice Global Conforto Bovino (IGCB)</h3>"+

  "<div style='margin-bottom:10px;font-size:15px;color:var(--t2);font-weight:500;line-height:1.4'>"+
  "Avalia o conforto dos animais com base na temperatura, humidade, lama, vento e radiação solar."+
  "</div>"+

  "<div class='kpi'>"+Number(valor).toFixed(1)+"</div>"+

  "<div class='kpi-sub'>"+
  level.txt+
  "<span class='thi-indicator "+level.class+"'></span>"+
  (trend ? " — "+trend : "")+
"</div>"+

  "<div class='kpi-sub' style='margin-top:10px;font-size:15px;color:var(--t3)'>"+
    action+
  "</div>";

grid.insertBefore(card, grid.firstChild);

  refreshCardsAndRotation();
}
  function calculateAndRenderIGCB(temp, rh, wind, radiation){

  if(LAST_RAIN_3D === null) return;
  if(LAST_RAIN_YTD === null) return;

  var igcb = calcIGCB(
    temp,
    rh,
    wind,
    radiation,
    LAST_RAIN_3D,
    LAST_RAIN_YTD
  );

  var level = igcbLevel(igcb);

var previousIGCB = IGCB_HISTORY.length > 0 ? IGCB_HISTORY[0] : null;

LAST_THI = igcb;
LAST_THI_LEVEL = level;

var trend = getTrend(igcb, previousIGCB);

var today = new Date().toISOString().slice(0,10);

// Só guarda 1 valor por dia
if(LAST_HISTORY_DAY !== today){

  IGCB_HISTORY.unshift(igcb);

  if(IGCB_HISTORY.length > 7){
    IGCB_HISTORY.pop();
  }

  LAST_HISTORY_DAY = today;

  try{
    localStorage.setItem("IGCB_HISTORY", JSON.stringify(IGCB_HISTORY));
    localStorage.setItem("IGCB_HISTORY_DAY", today);
  }catch(e){}
}
upsertTHICard(igcb, level, trend);

  var isa = calcISA();
if(isa !== null){

  var isaLvl = isaLevel(isa);

  var previousISA = ISA_HISTORY.length > 0 ? ISA_HISTORY[0] : null;

  var isaTrend = getTrend(isa, previousISA);

  // 👉 guardar histórico ISA (1 por dia)
  if(LAST_HISTORY_DAY === today){
    // já guardaste IGCB hoje → também guarda ISA
    ISA_HISTORY.unshift(isa);

    if(ISA_HISTORY.length > 7){
      ISA_HISTORY.pop();
    }
  }

  upsertISACard(isa, isaLvl, isaTrend);
}
}

  

  function calcISA(){

  if(IGCB_HISTORY.length === 0) return null;

  let pesos = [0.10, 0.15, 0.20, 0.25, 0.30];

  let total = 0;
  let pesoTotal = 0;

  for(let i=0;i<IGCB_HISTORY.length;i++){

    let stress = 100 - IGCB_HISTORY[i];

    total += stress * pesos[i];
    pesoTotal += pesos[i];
  }

  let stressMedio = total / pesoTotal;

  // penaliza recuperação demasiado rápida
  if(IGCB_HISTORY.length > 1){
    var delta = IGCB_HISTORY[0] - IGCB_HISTORY[1];

    if(delta > 8){
      stressMedio += 3;
    }

    if(delta > 15){
      stressMedio += 5;
    }
  }

  return Math.max(0, Math.min(100, 100 - stressMedio));
}


function isaLevel(isa){

  if (isa >= 80) return { txt:"Recuperação total", class:"thi-ok" };
  if (isa >= 65) return { txt:"Stress ligeiro acumulado", class:"thi-alerta" };
  if (isa >= 50) return { txt:"Stress moderado acumulado", class:"thi-stress" };

  return { txt:"Stress crítico acumulado", class:"thi-severo" };
}

function isaActionPlan(isa){

  if(isa >= 80)
    return "Animais totalmente recuperados.";

  if(isa >= 65)
    return "Monitorizar ingestão e zonas húmidas.";

  if(isa >= 50)
    return "Reforçar palha e avaliar redistribuição de lotes.";

  return "Intervenção urgente recomendada.";
}
function getTrend(current, previous){

  if(previous === null || previous === undefined)
    return "→ estável";

  var diff = current - previous;

  if(diff > 0.2) return "↑ a melhorar";
  if(diff < -0.2) return "↓ a degradar";

  return "→ estável";
}

/* ================= CSV PARSER ================= */
function parseCSV(text){
  var rows = [];
  var row = [];
  var field = "";
  var insideQuotes = false;

  for (var i = 0; i < text.length; i++) {
    var char = text[i];
    var nextChar = text[i + 1];

    if (char === '"') {
      if (insideQuotes && nextChar === '"') {
        field += '"';
        i++;
      } else {
        insideQuotes = !insideQuotes;
      }
    }
    else if (char === ',' && !insideQuotes) {
      row.push(field);
      field = "";
    }
    else if (char === '\n' && !insideQuotes) {
      row.push(field);
      rows.push(row);
      row = [];
      field = "";
    }
    else {
      field += char;
    }
  }

  if (field.length > 0) {
    row.push(field);
    rows.push(row);
  }

  var headers = rows.shift();

  return rows.map(function(r){
    var obj = {};
    for (var i=0; i<headers.length; i++){
      obj[headers[i].trim()] = (r[i] || "").trim();
    }
    return obj;
  });
}
function asBool(v){
  if(!v) return false;
  v = v.toString().trim().toLowerCase();
  return (v === "true" || v === "1" || v === "sim" || v === "yes");
}

function asNum(v){
  if(!v) return NaN;
  v = v.toString().trim().replace(",", ".");
  var n = Number(v);
  return isFinite(n) ? n : NaN;
}
/* ================= KPI ROTATION ================= */
var page = 0;
var cards = [];
var rotateTimer = null;

function refreshCardsAndRotation(){
  cards = Array.prototype.slice.call(document.querySelectorAll(".kpi-card"));
  startRotation();
}
function rotate(){
  if (!cards.length) return;
  var start = page * MAX_VISIBLE;
  var end = start + MAX_VISIBLE;

  for (var i=0;i<cards.length;i++){
    var show = (i>=start && i<end);
    if (show) cards[i].classList.remove("hidden");
    else cards[i].classList.add("hidden");
  }

  var totalPages = Math.ceil(cards.length / MAX_VISIBLE);
  page = (page + 1) % (totalPages || 1);
}
function startRotation(){
  if (rotateTimer) clearInterval(rotateTimer);
  page = 0;
  rotate();
  if (cards.length > MAX_VISIBLE){
    rotateTimer = setInterval(rotate, ROTATE_MS);
  }
}

function loadKPIs(){
  fetch(SHEET_URL, { cache: "no-store" })
    .then(function(r){ return r.text(); })
    .then(function(t){
      var rows = parseCSV(t).map(function(r){
        return {
          active: asBool(r.active),
          type: (r.type||"").trim().toLowerCase(),
          title: (r.title||"").trim(),
          value: (r.value||"").trim(),
          unit: (r.unit||"").trim(),
          imageUrl: (r.imageUrl||"").trim(),
          order: asNum(r.order)
        };
      }).filter(function(r){
        return r.active && r.type && r.title;
      });

      rows.sort(function(a,b){
        var ao = isFinite(a.order) ? a.order : 999999;
        var bo = isFinite(b.order) ? b.order : 999999;
        return ao - bo;
      });

      var grid = document.getElementById("kpis");

// remove apenas cards que vêm do sheets
var sheetCards = grid.querySelectorAll(".sheet-card");
sheetCards.forEach(function(c){
  c.remove();
});

        grid.innerHTML =
          "<div class='card kpi-card'>"+
            "<h3>Sem KPIs ativos</h3>"+
            "<div class='kpi-sub'>Liga KPIs na Google Sheet (active=TRUE).</div>"+
          "</div>";
      } else {
        for (var i=0;i<rows.length;i++){
          var r = rows[i];
          var body = "";

          if (r.type === "image"){
            body = r.imageUrl
              ? "<div class='kpi-image'><img src='"+r.imageUrl+"' alt=''></div>"
              : "<div class='kpi-sub'>Sem imageUrl</div>";
          } else if (r.type === "number"){
            body = "<div class='kpi'>"+(escapeHTML(r.value)||"--")+" <span>"+escapeHTML(r.unit||"")+"</span></div>";
          } else if (r.type === "text"){
  var raw = (r.value||"").replace(/^"|"$/g,"");
  var texto = escapeHTML(raw).replace(/\n/g,"<br>");
  body = "<div class='kpi kpi-multiline'>"+texto+"</div>";

          } else {
            body = "<div class='kpi-sub'>Tipo não suportado: "+escapeHTML(r.type)+"</div>";
          }

          grid.innerHTML +=
            "<div class='card kpi-card'>"+
              "<h3>"+escapeHTML(r.title)+"</h3>"+
              body+
            "</div>";
        }
      }

      refreshCardsAndRotation();

      // Recria chuva e volta a “encaixar” THI antes dela
      loadRainKPI();
    })
    .catch(function(){});
}

/* util p/ evitar injetar HTML por acidente */
function escapeHTML(s){
  return (s||"")
    .replace(/&/g,"&amp;")
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;")
    .replace(/"/g,"&quot;")
    .replace(/'/g,"&#039;");
}

function buildRainURL(start, end){
  return "https://archive-api.open-meteo.com/v1/archive"
    + "?latitude=" + LAT
    + "&longitude=" + LON
    + "&start_date=" + start
    + "&end_date=" + end
    + "&daily=precipitation_sum"
    + "&timezone=auto";
}
function getRainSum(startDate, endDate){
  return fetch(buildRainURL(startDate, endDate))
    .then(function(r){ return r.json(); })
    .then(function(d){
      if (!d.daily || !d.daily.precipitation_sum) return 0;
      return d.daily.precipitation_sum.reduce(function(a,b){ return a + (b||0); }, 0);
    })
    .catch(function(){ return 0; });
}
function getRainLast3Days(){
  var end = new Date();
  var start = new Date();
  start.setDate(end.getDate() - 3);

  return getRainSum(
    start.toISOString().slice(0,10),
    end.toISOString().slice(0,10)
  );
}

/* ================= SCHEDULE ================= */
function scheduleHourly(fn){
  fn();
  var now = new Date();
  var msToNextHour =
    (60 - now.getMinutes())*60*1000 - now.getSeconds()*1000 - now.getMilliseconds();
  if (msToNextHour < 1000) msToNextHour = 1000;

  setTimeout(function(){
    fn();
    setInterval(fn, 5*60*1000);
  }, msToNextHour);
}
